<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Events - Deckforge</title>
    <link rel="stylesheet" th:href="@{/universal.css}">
</head>

<div class="container">

    <h1>Events</h1>

    <p th:if="${errorMessage}" th:text="${errorMessage}" class="error"></p>

    <div th:each="event : ${events}" class="card">

        <h2 th:text="${event.title}">Event title</h2>

        <p>
            <strong>Type:</strong>
            <span th:text="${event.eventType}">Event type</span>
        </p>

        <p>
            <strong>Capacity:</strong>
            <span th:text="${event.capacity}">0</span>
        </p>

        <form th:action="@{/registerEvent}" method="post">

            <input type="hidden"
                   name="eventId"
                   th:value="${event.eventId}">

            <button type="submit">Register to event</button>

        </form>

    </div>

    <p th:if="${#lists.isEmpty(events)}">
        No events available.
    </p>

    <br>

    <a th:href="@{/}">Back to home page</a>

</div>
</body>
</html>
