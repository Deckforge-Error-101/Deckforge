<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <title>Deckforge - Profil</title>
    <link rel="stylesheet" th:href="@{/universal.css}">
</head>
<body>

<div th:replace="~{fragments :: header}"></div>

<hr>

<main style="display: flex;">

    <aside style="flex: 1;">
        <section class="rights">
            <h3>Rettigheder</h3>
            <span th:text="${session.user.roleType}">xx</span>
        </section>


        <section class="stats">
            <table border="1">
                <thead>
                <tr>
                    <th colspan="2">Stats</th>
                </tr>
                </thead>
                <tbody>
                <tr>
                    <td>Rank</td>
                    <td>#1</td>
                </tr>
                <tr>
                    <td>Winrate</td>
                    <td>65%</td>
                </tr>
                <tr>
                    <td>Total Match</td>
                    <td>120</td>
                </tr>
                <tr>
                    <td>Wins</td>
                    <td>78</td>
                </tr>
                <tr>
                    <td>Style</td>
                    <td>Aggro</td>
                </tr>
                </tbody>
            </table>
        </section>
    </aside>

    <section class="active-decks" style="flex: 2;">
        <table border="1">
            <thead>
            <tr>
                <th colspan="2">Aktive Decks</th>
            </tr>
            </thead>
            <tbody>
            <tr>
                <td>1</td>
                <td>Navn på Deck</td>
            </tr>
            <tr>
                <td>2</td>
                <td>Navn på Deck</td>
            </tr>
            <tr>
                <td>3</td>
                <td>Navn på Deck</td>
            </tr>
            <tr>
                <td>4</td>
                <td>Navn på Deck</td>
            </tr>
            <tr>
                <td>5</td>
                <td>Navn på Deck</td>
            </tr>
            </tbody>
        </table>
    </section>

    <section class="match-history" style="flex: 1;">
        <table border="1">
            <thead>
            <tr>
                <th>Match History</th>
            </tr>
            </thead>
            <tbody>
            <tr>
                <td>Win vs. Mads</td>
            </tr>
            <tr>
                <td>Loss vs. Admin</td>
            </tr>
            <tr>
                <td>Win vs. Mette</td>
            </tr>
            <tr>
                <td>Win vs. Patrick</td>
            </tr>
            <tr>
                <td>Win vs. Mohammad</td>
            </tr>
            </tbody>
        </table>
    </section>

</main>

<footer>
    <div class="footer-images">
        <p>[Billede]</p>
    </div>
</footer>

</body>
</html>
