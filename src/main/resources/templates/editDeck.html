<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Deckforge - Rediger Deck</title>
    <link rel="stylesheet" th:href="@{/universal.css}">
</head>
<body>

<div th:replace="~{fragments :: header}"></div>

<div class="container">
    <aside style="flex: 1;">
        <h2 th:text="${deck.deckName}" style="color: var(--accent-orange);">Deck Navn</h2>
        <p>Format: <span id="user-role" th:text="${deck.formatType}">Standard</span></p>
        <hr>

        <form th:action="@{/updateDeck}" th:object="${deck}" method="post" style="display: flex; flex-direction: column; gap: 10px;">

            <input type="hidden" th:field="*{deckId}">

            <label>Nyt navn</label>
            <input type="text" th:field="*{deckName}" required maxlength="50">

            <label>Ændre Type/Format</label>
            <select th:field="*{formatType}">
                <option value="STANDARD" th:selected="*{formatType == 'STANDARD'}">Standard</option>
                <option value="COMMANDER" th:selected="*{formatType == 'COMMANDER'}">Commander</option>
            </select>

            <div>
                <input type="checkbox" name="public" id="isPublic" value="true"
                       th:checked="${deck.isPublic}">
                <label for="isPublic" style="cursor: pointer; user-select: none;">Gør dækket offentligt synligt</label>
            </div>

            <button type="submit" style="background-color: var(--accent-orange); color: white; border: none; padding: 10px; cursor: pointer;">
                Gem ændringer
            </button>
        </form>

        <form th:action="@{/delete}" th:object="${deck}" method="post"
              onsubmit="return confirm('Er du helt sikker på, at du vil slette dette deck?');">

            <input type="hidden" th:field="*{deckId}">

            <button type="submit" style="width: 100%; background-color: transparent; color: #ff4444; border: 1px solid #ff4444; padding: 10px; cursor: pointer; border-radius: 4px;">
                Slet Deck
            </button>
        </form>
    </aside>

    <section style="flex: 2;">
        <h3>Kort i dækket</h3>
        <table>
            <thead>
            <tr>
                <th>Antal</th>
                <th>Kort Navn</th>
                <th>Handling</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="card : ${deckCards}">
                <td th:text="${card.quantity} + 'x'">1x</td>
                <td th:text="${card.cardName}">Kort Navn</td>
                <td>
                    <form th:action="@{/removeCardFromDeck}" method="post" style="margin:0;">
                        <input type="hidden" name="deckId" th:value="${deck.deckId}">
                        <input type="hidden" name="cardId" th:value="${card.cardId}">
                        <button type="submit" style="padding: 5px 10px; background-color: #444; color: #ff4444; border: 1px solid #ff4444;">Fjern</button>
                    </form>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(deckCards)}">
                <td colspan="3" style="text-align: center;">Dækket er tomt</td>
            </tr>
            </tbody>
        </table>
    </section>

    <section style="flex: 2;">
        <h3>Din Samling</h3>
        <table>
            <thead>
            <tr>
                <th>Antal ejer</th>
                <th>Kort Navn</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="cCard : ${userCollection}">
                <td th:text="${cCard.cardName}">Kort Navn</td>

                <td>
                    <form th:action="@{/addCardToDeck}" method="post" style="margin:0;">
                        <input type="hidden" name="deckId" th:value="${deck.deckId}">
                        <input type="hidden" name="cardId" th:value="${cCard.cardId}">
                        <button type="submit" style="padding: 5px 10px; background-color: var(--accent-blue); color: white;">+ Tilføj</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </section>
</div>

<footer>
    <p>&copy; 2026 Deckforge MTG</p>
</footer>

</body>
</html>
