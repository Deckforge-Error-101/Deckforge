<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - Deckforge</title>
</head>
<body>

<div class="container">
    <h2>Log ind</h2>

    <form th:action="@{/login}" method="post" th:object="${loginForm}" th:field="*{email}" required>

        <label>Email</label>
        <input type="email" th:field="*{email}">

        <label>Password</label>
        <input type="password" th:field="*{password}" required>

        <button type="submit">Log in</button>

        <div th:if="${error}" class="error" th:text="${error}"></div>
    </form>
</div>

</body>
</html>
