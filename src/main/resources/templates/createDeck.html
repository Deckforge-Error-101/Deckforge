<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Deckforge - Opret Deck</title>
    <link rel="stylesheet" th:href="@{/universal.css}">
</head>
<body>

<div th:replace="~{fragments :: header}"></div>

<main style="max-width: 600px; margin: 40px auto; padding: 20px; background: #222; border-radius: 8px; border: 1px solid var(--accent-orange);">

    <header style="text-align: center; margin-bottom: 30px;">
        <h1 style="color: var(--accent-orange);">Opret Nyt Deck</h1>
        <p style="color: #888;">Giv dit dæk et navn og vælg dit foretrukne format.</p>
    </header>

    <div th:if="${error}" style="background: rgba(255, 0, 0, 0.2); color: #ff4444; padding: 10px; border-radius: 4px; margin-bottom: 20px; border: 1px solid #ff4444;">
        <p th:text="${error}"></p>
    </div>

    <form th:action="@{/createDeck}" th:object="${deck}" method="post" style="display: flex; flex-direction: column; gap: 20px;">

        <div style="display: flex; flex-direction: column; gap: 8px;">
            <label for="deckName" style="color: #eee; font-weight: bold;">Deck Navn</label>
            <input type="text" id="deckName" th:field="*{deckName}"
                   placeholder="Eks. My Spicy Goblins" required
                   style="padding: 10px; background: #333; border: 1px solid #444; color: white; border-radius: 4px;">
        </div>

        <div style="display: flex; flex-direction: column; gap: 8px;">
            <label for="formatType" style="color: #eee; font-weight: bold;">Format</label>
            <select id="formatType" th:field="*{formatType}"
                    style="padding: 10px; background: #333; border: 1px solid #444; color: white; border-radius: 4px;">
                <option value="Standard">Standard</option>
                <option value="Commander">Commander</option>
            </select>
        </div>

        <div style="display: flex; align-items: center; gap: 10px; padding: 10px; background: #2a2a2a; border-radius: 4px;">
            <input type="checkbox" id="isPublic" th:field="*{isPublic}" style="width: 18px; height: 18px; cursor: pointer;">
            <label for="isPublic" style="color: #ccc; font-size: 0.9rem; cursor: pointer;">Gør dækket synligt for alle (Public)</label>
        </div>

        <button type="submit" style="background: var(--accent-orange); color: white; border: none; padding: 12px; font-weight: bold; border-radius: 4px; cursor: pointer; transition: 0.3s;">
            Opret Deck
        </button>

        <a href="/decks" style="text-align: center; color: #888; text-decoration: none; font-size: 0.9rem;">Annuller</a>

    </form>
</main>

<footer>
    <p>&copy; 2026 Deckforge MTG</p>
</footer>

</body>
</html>
