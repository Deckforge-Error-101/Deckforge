<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Deckforge - Opret Deck</title>
    <link rel="stylesheet" th:href="@{/universal.css}">
</head>
<body>

<div th:replace="~{fragments :: header}"></div>

<main>

    <header>
        <h1>Opret Nyt Deck</h1>
        <p>Giv dit dæk et navn og vælg dit foretrukne format.</p>
    </header>

    <div th:if="${error}">
        <p th:text="${error}"></p>
    </div>

    <form th:action="@{/createDeck}" th:object="${deck}" method="post">

        <div>
            <label for="deckName" style="color: #eee; font-weight: bold;">Deck Navn</label>
            <input type="text" id="deckName" th:field="*{deckName}"
                   placeholder="Eks. My Spicy Goblins" required
                   maxlength="50">
        </div>

        <div>
            <label for="formatType" style="color: #eee; font-weight: bold;">Format</label>
            <select id="formatType" th:field="*{formatType}">
                <option value="Standard">Standard</option>
                <option value="Commander">Commander</option>
            </select>
        </div>

        <div>
            <input type="checkbox" th:field="*{public}">
            <label>Gør dækket synligt for alle</label>
        </div>

        <button type="submit" style="background: var(--accent-orange); color: white; border: none; padding: 12px; font-weight: bold; border-radius: 4px; cursor: pointer; transition: 0.3s;">
            Opret Deck
        </button>

        <a href="/" style="text-align: center; color: #888; text-decoration: none; font-size: 0.9rem;">Annuller</a>

    </form>
</main>

<footer>
    <p>&copy; 2026 Deckforge MTG</p>
</footer>

</body>
</html>
