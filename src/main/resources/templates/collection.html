<!DOCTYPE html>
<html lang="da" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Din Samling</title>
    <link rel="stylesheet" th:href="@{/universal.css}">
</head>
<body>

<div th:replace="~{fragments :: header}"></div>

<div class="container">
    <h2>Min Samling</h2>

    <!-- Viser den genererede byttekode, hvis den findes -->
    <div th:if="${successMessage}" th:text="${successMessage}" class="alert-success"></div>

    <div class="add-form">
        <form th:action="@{/collection/add}" method="post">
            <label for="cardSelect">Tilføj kort til samling:</label>
            <select name="card.cardId" id="cardSelect" required>
                <option value="" disabled selected>-- Vælg et kort --</option>
                <option th:each="card : ${allCards}"
                        th:value="${card.cardId}"
                        th:text="${card.cardName} + ' (' + ${card.cardRarity} + ')'">
                </option>
            </select>
            <button type="submit">Tilføj</button>
        </form>
    </div>

    <table>
        <thead>
        <tr>
            <th>Kort Navn</th>
            <th>Type</th>
            <th>Sjældenhed (Rarity)</th>
            <th>Antal</th>
            <th>Handling</th>
            <th>Billede</th>
        </tr>
        </thead>
        <tbody>

        <tr th:if="${#lists.isEmpty(userCollection)}">
            <td colspan="5" class="empty">Din samling er tom. Tilføj et kort ovenfor!</td>
        </tr>

        <tr th:each="card : ${userCollection}">
            <td th:text="${card.cardName}">Kort Navn</td>
            <td th:text="${card.cardType}">Type</td>
            <td th:text="${card.cardRarity}">Rarity</td>
            <td th:text="${card.quantity}">1</td>
            <td>
                <!-- Eksisterende fjern-knap -->
                <form class="action-form" th:action="@{/collection/remove}" method="post">
                    <input type="hidden" name="cardId" th:value="${card.cardId}">
                    <button type="submit" class="btn-remove">Fjern</button>
                </form>

                <!-- NYT: Knap til at generere byttekode -->
                <form class="action-form" th:action="@{/collection/set-tradeable}" method="post">
                    <input type="hidden" name="cardId" th:value="${card.cardId}">
                    <button type="submit">Sæt på bytte marked</button>
                </form>

                <form class="action-form" th:if="${card.tradeId == null}" th:action="@{/collection/set-tradeable}" method="post">
                    <input type="hidden" name="cardId" th:value="${card.cardId}">
                    <button type="submit">Gør tradeable</button>
                </form>

                <form class="action-form" th:if="${card.tradeId != null}" th:action="@{/collection/remove-tradeable}" method="post">
                    <input type="hidden" name="cardId" th:value="${card.cardId}">
                    <button type="submit">Tradeable</button>
                </form>
            </td>
            <td>
                <img th:src="@{'/images/card-' + ${card.cardId} + '.png'}"
                     onerror="this.src='/images/card-default.png';"
                     alt="Kort billede"
                     class="card-thumbnail">
            </td>
        </tr>
        </tbody>
    </table>
</div>

<footer>
    <p>&copy; 2026 Deckforge MTG</p>
</footer>

</body>
</html>
